<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>FF14 角色資訊面板</title>

<style>

body{
font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
background:#f8fafc;
color:#1e293b;
max-width:1200px;
margin:30px auto;
padding:20px
}

h1{
text-align:center;
font-weight:900
}

.version-tag{
font-size:14px;
color:#6d28d9;
font-weight:bold;
background:#ede9fe;
padding:4px 10px;
border-radius:8px;
border:1px solid #c4b5fd
}

.find-panel{
display:flex;
gap:10px;
margin-bottom:30px;
justify-content:center
}

#findInput{
width:100%;
max-width:500px;
padding:14px 20px;
font-size:16px;
border:2px solid #cbd5e1;
border-radius:12px
}

#findBtn{
padding:14px 30px;
font-size:16px;
background:#4f46e5;
color:white;
border:none;
border-radius:12px;
cursor:pointer
}

.sys-msg{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
font-weight:bold
}

#blueprint-container{
display:none;
background:white;
border:2px solid #0f172a;
padding:30px
}

.bp-top-row{
display:flex;
gap:25px;
margin-bottom:25px
}

.bp-left-col{
flex:0 0 360px;
display:flex;
flex-direction:column;
gap:20px
}

.bp-img-box{
border:2px solid #0f172a;
height:450px;
display:flex;
align-items:center;
justify-content:center;
position:relative
}

.bp-img-box img{
max-width:100%;
max-height:100%;
object-fit:contain;
cursor:zoom-in
}

.bp-img-title{
position:absolute;
top:-14px;
left:15px;
background:white;
padding:0 8px;
font-weight:900
}

.bp-btn-box{
border:2px solid #0f172a;
padding:25px 15px 15px 15px;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
position:relative;
background:#f8fafc
}

.bp-btn-title{
position:absolute;
top:-14px;
left:15px;
background:white;
padding:0 8px;
font-weight:900
}

.bp-btn{
background:#fff;
border:1px solid #cbd5e1;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold
}

.bp-btn.active{
background:#4f46e5;
color:white
}

.bp-right-col{
flex:1;
border:2px solid #0f172a;
padding:25px;
position:relative;
overflow-y:auto;
max-height:550px
}

.bp-info-title{
position:absolute;
top:-14px;
left:15px;
background:white;
padding:0 8px;
font-weight:900
}

.info-row{
display:flex;
padding:10px 0;
border-bottom:1px dashed #e2e8f0
}

.info-lbl{
flex:0 0 120px;
font-weight:900
}

.info-val{
flex:1
}

.bp-bottom-row{
border:2px solid #0f172a;
padding:30px;
position:relative;
margin-top:25px
}

.bp-bottom-title{
position:absolute;
top:-14px;
left:15px;
background:white;
padding:0 8px;
font-weight:900
}

#lightbox{
display:none;
position:fixed;
z-index:999999;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
align-items:center;
justify-content:center;
flex-direction:column
}

#lightbox img{
max-width:90%;
max-height:85vh;
border:3px solid #fff
}

#lightbox-close{
color:white;
margin-top:25px;
padding:10px 30px;
background:rgba(255,255,255,0.2);
border-radius:30px;
cursor:pointer
}

</style>

</head>

<body>

<h1>🗡️ FF14 角色資訊面板 <span class="version-tag">(v19 穩定版)</span></h1>

<div class="find-panel">
<input id="findInput" value="塔塔露">
<button id="findBtn">搜尋角色</button>
</div>

<div id="status-msg"></div>

<div id="blueprint-container">

<div class="bp-top-row">

<div class="bp-left-col">

<div class="bp-img-box">
<div class="bp-img-title">人物照片</div>
<img id="dash-main-img">
</div>

<div class="bp-btn-box">
<div class="bp-btn-title">對應人物版本</div>
<div id="dash-img-controls"></div>
</div>

</div>

<div class="bp-right-col">
<div class="bp-info-title">角色信息</div>
<div id="dash-right"></div>
</div>

</div>

<div class="bp-bottom-row">
<div class="bp-bottom-title">人物詳細資料</div>
<div id="wiki-content"></div>
</div>

</div>

<div id="lightbox">
<img id="lightbox-img">
<div id="lightbox-close">關閉</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

<script>

let characterImages=[]

document.getElementById("findBtn").onclick=triggerSearch

document.getElementById("findInput").addEventListener("keypress",e=>{
if(e.key==="Enter")triggerSearch()
})

/* =========================
   CORS突破 fetch
========================= */

async function superFetch(searchKeyword){

const targetUrl=`https://ff14.huijiwiki.com/api.php?action=parse&format=json&page=${encodeURIComponent(searchKeyword)}&redirects=1&prop=text`

const isValid=(d)=>d&&(d.parse||(d.error&&d.error.code==="missingtitle"))

function fetchJsonp(url){
return new Promise((resolve,reject)=>{

const callbackName="jsonp_"+Math.random().toString(36).substring(7)

window[callbackName]=(data)=>{
delete window[callbackName]
document.body.removeChild(script)
resolve(data)
}

const script=document.createElement("script")
script.src=url+"&callback="+callbackName
script.onerror=()=>reject()

document.body.appendChild(script)

})
}

try{
let data=await fetchJsonp(targetUrl)
if(isValid(data))return data
}catch(e){}

try{
let res=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`)
let data=await res.json()
if(isValid(data))return data
}catch(e){}

try{
let res=await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`)
let data=await res.json()
if(isValid(data))return data
}catch(e){}

try{
let res=await fetch(targetUrl+"&origin=*")
let data=await res.json()
if(isValid(data))return data
}catch(e){}

throw new Error("伺服器阻擋")

}

/* ========================= */

async function triggerSearch(){

let keyword=document.getElementById("findInput").value.trim()

if(!keyword)return

document.getElementById("status-msg").innerHTML='<div class="sys-msg">🟢 正在搜尋角色...</div>'

let data=await superFetch(keyword)

if(data.error){
document.getElementById("status-msg").innerHTML="找不到角色"
return
}

let parser=new DOMParser()
let doc=parser.parseFromString(data.parse.text["*"],"text/html")

/* =========================
   Global Harvester
========================= */

let fallbackLabels=[]

doc.querySelectorAll(".tabber ul,.tab-content ul,.pi-image-collection ul").forEach(ul=>{

ul.querySelectorAll("li,a").forEach(item=>{

let lbl=item.textContent.trim()

if(lbl && lbl.length<=15 && !/[，。！？]/.test(lbl)){
if(!fallbackLabels.includes(lbl))fallbackLabels.push(lbl)
}

})

ul.remove()

})

characterImages=[]
let addedUrls=new Set()

doc.querySelectorAll("img").forEach(img=>{

let src=img.getAttribute("data-src")||img.getAttribute("src")

if(!src)return

if(src.includes("icon")||src.includes("16px")||src.includes("32px"))return

if(src.startsWith("//"))src="https:"+src
if(src.startsWith("/"))src="https://ff14.huijiwiki.com"+src

if(src.includes("/thumb/")){
src=src.replace("/thumb/","/")
src=src.substring(0,src.lastIndexOf("/"))
}

if(addedUrls.has(src)){
img.remove()
return
}

addedUrls.add(src)

let label=null

let pane=img.closest(".tab-pane,.tabbertab,.pi-image-collection-tab-content")

if(pane){

if(pane.getAttribute("title"))label=pane.getAttribute("title").trim()

if(!label && pane.getAttribute("data-title"))label=pane.getAttribute("data-title").trim()

}

if(!label){

let alt=img.getAttribute("alt")

if(alt && alt.length<=15)label=alt

}

characterImages.push({url:src,label:label,el:img})

})

let fbIndex=0

characterImages.forEach(item=>{

if(!item.label){

if(fbIndex<fallbackLabels.length){
item.label=fallbackLabels[fbIndex]
fbIndex++
}else{
item.label="外觀預覽"
}

}

item.el.remove()

})

/* ========================= */

renderImages()

document.getElementById("blueprint-container").style.display="block"

document.getElementById("status-msg").innerHTML=""

}

function renderImages(){

let controls=document.getElementById("dash-img-controls")

controls.innerHTML=""

characterImages.forEach((img,i)=>{

let btn=document.createElement("button")

btn.className="bp-btn"

btn.innerText=img.label

btn.onclick=()=>changeImage(i)

controls.appendChild(btn)

})

changeImage(0)

}

function changeImage(i){

document.getElementById("dash-main-img").src=characterImages[i].url

document.querySelectorAll(".bp-btn").forEach(b=>b.classList.remove("active"))

document.querySelectorAll(".bp-btn")[i].classList.add("active")

}

/* lightbox */

document.addEventListener("click",e=>{

if(e.target.tagName==="IMG"){

let src=e.target.src

document.getElementById("lightbox-img").src=src

document.getElementById("lightbox").style.display="flex"

}

})

document.getElementById("lightbox").onclick=()=>{
document.getElementById("lightbox").style.display="none"
}

</script>

</body>
</html>
