<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>FF14 灰機 Wiki 現代化查詢</title>
    <script src="https://unpkg.com/opencc-js@1.0.5/dist/umd/full.js"></script>
    <style>
        /* === 全局現代化基礎設定 === */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #f0f4f8; color: #334155; max-width: 1400px; margin: 30px auto; padding: 20px; }
        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; font-weight: 800; }
        .version-tag { font-size: 14px; color: #64748b; font-weight: normal; vertical-align: middle; }
        
        /* === 搜尋列 === */
        .search-container { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        input[type="text"] { width: 100%; max-width: 500px; padding: 14px 20px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 30px; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        button { padding: 14px 30px; font-size: 16px; background: #3b82f6; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }

        .loading, .error { background: white; padding: 30px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .loading { color: #3b82f6; }
        .error { color: #ef4444; }

        /* === ⭐️ 絕對鎖死雙欄排版 ⭐️ === */
        #result-wrapper { 
            display: flex; 
            flex-direction: row; /* 強制橫向排列 */
            gap: 30px; 
            align-items: flex-start; 
            margin-top: 20px; 
            width: 100%;
        }
        
        /* 左欄：專屬角色資訊框 */
        #wiki-sidebar { 
            flex: 0 0 350px; /* 絕對寬度，不准縮小也不准放大 */
            background: #ffffff; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            display: none; 
            box-sizing: border-box;
        }
        /* 暴力洗掉 Wiki 資訊框的預設樣式 */
        #wiki-sidebar .infobox, #wiki-sidebar table { width: 100% !important; margin: 0 !important; float: none !important; border-collapse: collapse; font-size: 14px; }
        #wiki-sidebar th { background-color: #f1f5f9; padding: 10px; border-bottom: 2px solid #cbd5e1; font-weight: bold; border-radius: 4px; }
        #wiki-sidebar td { padding: 10px 5px; border-bottom: 1px dashed #e2e8f0; }
        #wiki-sidebar ul { list-style: none !important; padding: 0 !important; margin: 0 !important; }
        #wiki-sidebar img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; }
        
        /* 右欄：主內容區 */
        #wiki-content { 
            flex: 1 1 0; /* 佔滿剩餘空間，防止被內部大表格撐破 */
            background: #ffffff; 
            border-radius: 12px; 
            padding: 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            display: none; 
            line-height: 1.8; 
            font-size: 16px; 
            overflow-x: auto; /* 如果表格太大就出現捲軸，不准把雙欄撐破 */
            box-sizing: border-box;
        }
        
        /* 強制顯示所有原本被折疊的內容 */
        .tab-pane, .tabbertab, .mw-collapsible-content, div[class*="tab-content"] {
            display: block !important; opacity: 1 !important; visibility: visible !important; height: auto !important; padding: 15px 0 !important; border-top: 2px dashed #e2e8f0; margin-top: 20px;
        }

        /* 畫廊美化 */
        ul.gallery { display: flex; flex-wrap: wrap; gap: 15px; padding: 0; margin: 20px 0; list-style: none; }
        li.gallerybox { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; width: 160px; text-align: center; }
        li.gallerybox img { max-width: 100%; cursor: zoom-in; border-radius: 4px; }
        
        table.wikitable { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table.wikitable th, table.wikitable td { border: 1px solid #cbd5e1; padding: 10px; }
        table.wikitable th { background: #f1f5f9; }
        
        img { max-width: 100%; cursor: zoom-in; }
        .thumbinner { border: 1px solid #e2e8f0; padding: 10px; background: #f8fafc; float: right; margin: 0 0 20px 20px; text-align: center; }
        
        /* 隱藏無用元素 */
        .navbox, .mw-editsection, .noprint, .toc { display: none !important; }
        a { color: #3b82f6; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* 燈箱 */
        #lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; }
        #lightbox img { max-width: 90%; max-height: 85vh; border-radius: 8px; border: 3px solid #fff; }
        #lightbox-close { color: white; margin-top: 20px; padding: 8px 25px; font-size: 16px; background: rgba(255,255,255,0.2); border-radius: 20px; cursor: pointer; }
        #lightbox-close:hover { background: rgba(255,255,255,0.4); }

        /* 手機版自動變單欄 */
        @media (max-width: 900px) {
            #result-wrapper { flex-direction: column; }
            #wiki-sidebar { flex: auto; width: 100%; }
        }
    </style>
</head>
<body>

    <h1>🗡️ FF14 灰機 Wiki 現代化查詢 <span class="version-tag">(v3.0 淨化版)</span></h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="請輸入關鍵字（例如：塔塔露...）" value="塔塔露">
        <button id="searchBtn">搜尋資料</button>
    </div>

    <div id="status-msg"></div>

    <div id="result-wrapper">
        <div id="wiki-sidebar"></div>
        <div id="wiki-content"></div>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="放大圖片">
        <div id="lightbox-close">✖ 點擊關閉</div>
    </div>

    <script>
        window.onload = function() {
            try {
                const s2tConverter = OpenCC.Converter({ from: 'cn', to: 'tw' }); 
                const t2sConverter = OpenCC.Converter({ from: 'tw', to: 'cn' }); 

                document.getElementById('searchBtn').addEventListener('click', () => {
                    const keyword = document.getElementById('searchInput').value.trim();
                    if (keyword) fetchWikiData(keyword, s2tConverter, t2sConverter);
                });
                document.getElementById('searchInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') document.getElementById('searchBtn').click();
                });
            } catch (error) {
                document.getElementById('status-msg').innerHTML = `<div class="error">OpenCC 載入失敗。</div>`;
            }
        };

        function fetchJsonp(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = url + '&callback=' + callbackName;
                script.onerror = () => reject(new Error('連線被阻擋'));
                document.body.appendChild(script);
            });
        }

        async function fetchWikiData(keyword, s2tConverter, t2sConverter) {
            const searchKeyword = t2sConverter(keyword);
            document.getElementById('status-msg').innerHTML = `<div class="loading">正在物理粉碎垃圾代碼...</div>`;
            document.getElementById('wiki-sidebar').style.display = 'none';
            document.getElementById('wiki-content').style.display = 'none';

            const baseUrl = "https://ff14.huijiwiki.com/api.php";
            const params = new URLSearchParams({
                action: "parse",
                format: "json",
                page: searchKeyword,
                redirects: "1",
                prop: "text"
            });

            try {
                const data = await fetchJsonp(`${baseUrl}?${params.toString()}`);

                if (data.error) {
                    document.getElementById('status-msg').innerHTML = `<div class="error">找不到關於「${keyword}」的資訊。</div>`;
                    return;
                }

                const parser = new DOMParser();
                const doc = parser.parseFromString(data.parse.text['*'], 'text/html');

                // 🔧 圖片修復與防止跳轉
                doc.querySelectorAll('img').forEach(img => {
                    let realSrc = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('src');
                    if (realSrc) {
                        if (realSrc.startsWith('//')) img.setAttribute('src', 'https:' + realSrc);
                        else if (realSrc.startsWith('/')) img.setAttribute('src', 'https://ff14.huijiwiki.com' + realSrc);
                        else img.setAttribute('src', realSrc);
                    }
                    img.removeAttribute('data-src'); img.removeAttribute('srcset');
                });
                doc.querySelectorAll('a').forEach(a => {
                    if (a.querySelector('img')) { a.outerHTML = a.innerHTML; } 
                    else {
                        let href = a.getAttribute('href');
                        if (href && href.startsWith('/')) a.setAttribute('href', 'https://ff14.huijiwiki.com' + href);
                        a.setAttribute('target', '_blank');
                    }
                });

                // 🧹 終極真空吸塵器：無情粉碎所有的頁籤按鈕與空白點點
                
                // 1. 砍掉所有擔任「按鈕」的標籤
                doc.querySelectorAll('ul[class*="nav"], ul[class*="tab"], div[class*="nav"], .tabbernav').forEach(el => el.remove());
                
                // 2. 砍掉所有裡面「沒有文字也沒有圖片」的空殼 (包含 li, tr, p)
                doc.querySelectorAll('li, tr, p').forEach(el => {
                    // 把裡面所有的空白、換行全部消除後來計算長度，如果是 0 就代表裡面沒字！
                    let cleanText = (el.textContent || '').replace(/\s/g, '');
                    if (cleanText.length === 0 && !el.querySelector('img')) {
                        el.remove(); // 直接物理刪除這個空殼
                    }
                });

                // 3. 剝奪原網站所有強制設定的寬度 (防止撐破我們的雙欄)
                doc.querySelectorAll('*').forEach(el => {
                    if(el.style.width) el.style.width = '';
                    if(el.style.minWidth) el.style.minWidth = '';
                });

                // 繁體翻譯
                function translateTextNodes(node) {
                    if (node.nodeType === 3) node.nodeValue = s2tConverter(node.nodeValue);
                    else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                        node.childNodes.forEach(child => translateTextNodes(child));
                    }
                }
                const rootNode = doc.querySelector('.mw-parser-output') || doc.body;
                translateTextNodes(rootNode);

                // ⭐️ 真正的左右分離手術
                document.getElementById('status-msg').innerHTML = ''; 
                
                const sidebarDiv = document.getElementById('wiki-sidebar');
                const contentDiv = document.getElementById('wiki-content');
                sidebarDiv.innerHTML = ''; contentDiv.innerHTML = '';

                // 把資訊框移入左欄
                const infoboxes = rootNode.querySelectorAll('.infobox, .portable-infobox, table[class*="infobox"]');
                if (infoboxes.length > 0) {
                    infoboxes.forEach(box => sidebarDiv.appendChild(box));
                    sidebarDiv.style.display = 'block';
                } else {
                    sidebarDiv.style.display = 'none'; 
                }

                // 把剩下乾淨的主內容放入右欄
                contentDiv.appendChild(rootNode);
                contentDiv.style.display = 'block';

            } catch (error) {
                document.getElementById('status-msg').innerHTML = `<div class="error">資料重構失敗：${error.message}</div>`;
            }
        }

        // 燈箱控制
        document.body.addEventListener('click', function(e) {
            if (e.target.tagName === 'IMG' && e.target.id !== 'lightbox-img') {
                e.preventDefault(); e.stopPropagation();
                
                const thumbSrc = e.target.src; 
                let hdSrc = thumbSrc;          
                if (hdSrc.includes('/thumb/')) {
                    hdSrc = hdSrc.replace('/thumb/', '/');
                    hdSrc = hdSrc.substring(0, hdSrc.lastIndexOf('/'));
                }
                
                const lightboxImg = document.getElementById('lightbox-img');
                lightboxImg.onerror = function() { this.onerror = null; this.src = thumbSrc; };
                lightboxImg.src = hdSrc;
                document.getElementById('lightbox').style.display = 'flex';
            }
        });

        document.getElementById('lightbox').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('lightbox-img').src = ''; 
        });
    </script>

</body>
</html>
