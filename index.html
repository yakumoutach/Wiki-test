<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>FF14 灰機 Wiki 快速查詢</title>
    <script src="https://unpkg.com/opencc-js@1.0.5/dist/umd/full.js"></script>
    <style>
        /* === 🌐 全局現代化基礎設定 === */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #eef2f6; color: #2c3e50; max-width: 1200px; margin: 40px auto; padding: 20px; }
        h1 { text-align: center; color: #1e293b; margin-bottom: 30px; font-weight: 800; letter-spacing: 2px; }
        
        /* === 🔍 搜尋列美化 === */
        .search-container { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        input[type="text"] { width: 50%; max-width: 600px; padding: 14px 20px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 30px; outline: none; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        input[type="text"]:focus { border-color: #6366f1; box-shadow: 0 4px 12px rgba(99,102,241,0.15); }
        button { padding: 14px 30px; font-size: 16px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: bold; box-shadow: 0 4px 6px rgba(99,102,241,0.2); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99,102,241,0.3); }

        /* === 📊 雙欄式排版容器 (關鍵改變) === */
        #result-wrapper { display: flex; gap: 25px; align-items: flex-start; margin-top: 20px; }
        
        /* 💡 左欄：專屬資訊框 */
        #wiki-sidebar { flex: 0 0 320px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; display: none; }
        #wiki-sidebar .infobox, #wiki-sidebar table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 0; float: none; }
        #wiki-sidebar th { background-color: #f8fafc; color: #334155; padding: 12px; border-bottom: 2px solid #e2e8f0; text-align: center; font-weight: bold; }
        #wiki-sidebar td { padding: 12px 15px; border-bottom: 1px dashed #e2e8f0; color: #475569; }
        #wiki-sidebar td:first-child { font-weight: bold; color: #1e293b; width: 35%; }
        #wiki-sidebar ul { list-style: none; padding: 0; margin: 0; }
        
        /* 💡 右欄：主內容區 */
        #wiki-content { flex: 1; min-width: 0; background: white; border-radius: 12px; padding: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: none; line-height: 1.8; font-size: 16px; }
        
        .loading, .error { background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); font-weight: bold; font-size: 18px; width: 100%; }
        .loading { color: #6366f1; }
        .error { color: #ef4444; }

        /* === 🎨 主內容區的細部排版 === */
        /* 表格 */
        #wiki-content table.wikitable { width: 100%; border-collapse: collapse; margin: 25px 0; border-radius: 8px; overflow: hidden; box-shadow: 0 0 0 1px #e2e8f0; }
        #wiki-content table.wikitable th { background-color: #f1f5f9; padding: 12px; border: 1px solid #cbd5e1; color: #1e293b; }
        #wiki-content table.wikitable td { padding: 12px; border: 1px solid #e2e8f0; }
        /* 畫廊 (橫向排列) */
        ul.gallery { display: flex; flex-wrap: wrap; gap: 20px; padding: 0; margin: 25px 0; list-style: none; }
        li.gallerybox { margin: 0; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; transition: 0.3s; width: 160px; text-align: center; }
        li.gallerybox:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.08); border-color: #cbd5e1; }
        li.gallerybox img { max-width: 140px; height: auto; border-radius: 4px; cursor: zoom-in; }
        .gallerytext { font-size: 13px; color: #64748b; margin-top: 10px; line-height: 1.4; }
        /* 圖片與浮動 */
        img { max-width: 100%; height: auto; cursor: zoom-in; }
        .thumbinner { border: 1px solid #e2e8f0; padding: 10px; background: #f8fafc; border-radius: 8px; float: right; margin: 0 0 20px 20px; text-align: center; font-size: 13px; color: #64748b; }
        /* 頁籤標題標籤 */
        .custom-tab-title { display: inline-block; background: #6366f1; color: white; padding: 6px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin: 30px 0 15px 0; box-shadow: 0 4px 6px rgba(99,102,241,0.2); }
        
        /* 隱藏無用元素 */
        .navbox, .mw-editsection, .noprint, .toc, .mw-empty-elt { display: none !important; }
        a { color: #3b82f6; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; color: #2563eb; }
        .read-more { display: block; margin-top: 40px; text-align: center; font-size: 16px; font-weight: bold; padding: 15px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 12px; color: #475569; transition: 0.2s; }
        .read-more:hover { background: #f1f5f9; border-color: #94a3b8; color: #1e293b; text-decoration: none; }

        /* === 🔍 燈箱 (Lightbox) === */
        #lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; flex-direction: column; }
        #lightbox img { max-width: 90%; max-height: 80vh; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #lightbox-close { color: white; margin-top: 25px; padding: 10px 30px; font-size: 16px; font-weight: bold; background: rgba(255,255,255,0.15); border-radius: 30px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        #lightbox-close:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }

        /* 響應式設計：手機螢幕自動變為單欄 */
        @media (max-width: 800px) {
            #result-wrapper { flex-direction: column; }
            #wiki-sidebar { flex: auto; width: 100%; }
        }
    </style>
</head>
<body>

    <h1>🗡️ FF14 灰機 Wiki 現代化查詢</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="請輸入關鍵字（例如：塔塔露...）" value="塔塔露">
        <button id="searchBtn">搜尋資料</button>
    </div>

    <div id="status-msg"></div>

    <div id="result-wrapper">
        <div id="wiki-sidebar"></div>
        <div id="wiki-content"></div>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="放大圖片">
        <div id="lightbox-close">✖ 點擊關閉</div>
    </div>

    <script>
        window.onload = function() {
            try {
                const s2tConverter = OpenCC.Converter({ from: 'cn', to: 'tw' }); 
                const t2sConverter = OpenCC.Converter({ from: 'tw', to: 'cn' }); 

                document.getElementById('searchBtn').addEventListener('click', () => {
                    const keyword = document.getElementById('searchInput').value.trim();
                    if (keyword) fetchWikiData(keyword, s2tConverter, t2sConverter);
                });

                document.getElementById('searchInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') document.getElementById('searchBtn').click();
                });
            } catch (error) {
                showError("OpenCC 載入失敗，請確認網路或重新整理。");
            }
        };

        function showLoading(msg) {
            document.getElementById('status-msg').innerHTML = `<div class="loading">${msg}</div>`;
            document.getElementById('wiki-sidebar').style.display = 'none';
            document.getElementById('wiki-content').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('status-msg').innerHTML = `<div class="error">${msg}</div>`;
            document.getElementById('wiki-sidebar').style.display = 'none';
            document.getElementById('wiki-content').style.display = 'none';
        }

        function fetchJsonp(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = url + '&callback=' + callbackName;
                script.onerror = () => reject(new Error('連線被阻擋'));
                document.body.appendChild(script);
            });
        }

        async function fetchWikiData(keyword, s2tConverter, t2sConverter) {
            const searchKeyword = t2sConverter(keyword);
            showLoading("正在解析並重構網頁排版...");

            const baseUrl = "https://ff14.huijiwiki.com/api.php";
            const params = new URLSearchParams({
                action: "parse",
                format: "json",
                page: searchKeyword,
                redirects: "1",
                prop: "text"
            });

            try {
                const data = await fetchJsonp(`${baseUrl}?${params.toString()}`);

                if (data.error) {
                    showError(`找不到關於「${keyword}」的資訊。`);
                    return;
                }

                // 建立虛擬 DOM 來進行外科手術
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.parse.text['*'], 'text/html');

                // 🔧 1. 圖片與連結修復
                doc.querySelectorAll('img').forEach(img => {
                    let realSrc = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('src');
                    if (realSrc) {
                        if (realSrc.startsWith('//')) img.setAttribute('src', 'https:' + realSrc);
                        else if (realSrc.startsWith('/')) img.setAttribute('src', 'https://ff14.huijiwiki.com' + realSrc);
                        else img.setAttribute('src', realSrc);
                    }
                    img.removeAttribute('data-src'); img.removeAttribute('srcset');
                });
                doc.querySelectorAll('a').forEach(a => {
                    if (a.querySelector('img')) { a.outerHTML = a.innerHTML; } 
                    else {
                        let href = a.getAttribute('href');
                        if (href && href.startsWith('/')) a.setAttribute('href', 'https://ff14.huijiwiki.com' + href);
                        a.setAttribute('target', '_blank');
                    }
                });

                // 🧹 2. 強力清潔機：消滅空心點點與多餘頁籤
                // 清除所有內容空白的 li
                doc.querySelectorAll('li').forEach(li => {
                    if (li.textContent.trim() === '') li.remove();
                });
                // 暴力拔除用來切換頁籤的導覽列 (消滅"角色信息/相關信息")
                doc.querySelectorAll('ul.nav, ul.nav-tabs, .huiji-tabs-nav, .pi-header').forEach(nav => nav.remove());

                // 📂 3. 強制展開所有隱藏的頁籤 (例如衣服)
                doc.querySelectorAll('.tab-pane, .tabbertab, .huiji-tab-content').forEach(pane => {
                    pane.style.display = 'block';
                    pane.style.opacity = '1';
                    pane.style.visibility = 'visible';
                    pane.style.height = 'auto';
                    pane.classList.remove('fade', 'hide'); // 移除隱藏樣式
                    
                    // 給展開的內容加個漂亮的小標題
                    let title = pane.getAttribute('title') || pane.getAttribute('data-title');
                    if (title && title !== 'null') {
                        let header = document.createElement('div');
                        header.className = 'custom-tab-title';
                        header.innerHTML = '📂 ' + title;
                        pane.insertBefore(header, pane.firstChild);
                    }
                });

                // ✂️ 4. 雙欄解體術：把「資訊框」單獨抓出來
                let sidebarHtml = '';
                const infobox = doc.querySelector('.infobox, .portable-infobox, table.infobox');
                if (infobox) {
                    sidebarHtml = infobox.outerHTML; // 複製資訊框
                    infobox.remove();                // 從主內容中砍掉它
                }

                // 🔤 5. 安全繁體翻譯
                function translateTextNodes(node) {
                    if (node.nodeType === 3) node.nodeValue = s2tConverter(node.nodeValue);
                    else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                        node.childNodes.forEach(child => translateTextNodes(child));
                    }
                }
                const rootNode = doc.querySelector('.mw-parser-output') || doc.body;
                translateTextNodes(rootNode);
                
                // 翻譯資訊框
                if(sidebarHtml) {
                    let tempDiv = document.createElement('div');
                    tempDiv.innerHTML = sidebarHtml;
                    translateTextNodes(tempDiv);
                    sidebarHtml = tempDiv.innerHTML;
                }

                // 🚀 6. 渲染到畫面上
                document.getElementById('status-msg').innerHTML = ''; // 清空載入中提示
                
                const sidebarDiv = document.getElementById('wiki-sidebar');
                if (sidebarHtml) {
                    sidebarDiv.innerHTML = sidebarHtml;
                    sidebarDiv.style.display = 'block';
                } else {
                    sidebarDiv.style.display = 'none'; // 如果這個角色沒資訊框，就隱藏左欄
                }

                const contentDiv = document.getElementById('wiki-content');
                const wikiUrl = `https://ff14.huijiwiki.com/wiki/${encodeURIComponent(data.parse.title)}`;
                const readMoreBtn = `<a href="${wikiUrl}" target="_blank" class="read-more">🔗 前往原站閱讀完整條目</a>`;
                contentDiv.innerHTML = rootNode.innerHTML + readMoreBtn;
                contentDiv.style.display = 'block';

            } catch (error) {
                console.error(error);
                showError(`資料重構失敗：${error.message}`);
            }
        }

        // 💡 燈箱控制機制
        document.body.addEventListener('click', function(e) {
            if (e.target.tagName === 'IMG' && e.target.id !== 'lightbox-img') {
                e.preventDefault(); e.stopPropagation();
                
                const thumbSrc = e.target.src; 
                let hdSrc = thumbSrc;          
                if (hdSrc.includes('/thumb/')) {
                    hdSrc = hdSrc.replace('/thumb/', '/');
                    hdSrc = hdSrc.substring(0, hdSrc.lastIndexOf('/'));
                }
                
                const lightboxImg = document.getElementById('lightbox-img');
                lightboxImg.onerror = function() { this.onerror = null; this.src = thumbSrc; };
                lightboxImg.src = hdSrc;
                document.getElementById('lightbox').style.display = 'flex';
            }
        });

        document.getElementById('lightbox').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('lightbox-img').src = ''; 
        });
    </script>

</body>
</html>
