<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>FF14 灰機 Wiki 現代化查詢</title>
    <style>
        /* === 🌐 基礎設定 === */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #f0f4f8; color: #334155; max-width: 1400px; margin: 30px auto; padding: 20px; }
        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; font-weight: 800; }
        .version-tag { font-size: 14px; color: #d97706; font-weight: bold; vertical-align: middle; background: #fef3c7; padding: 4px 8px; border-radius: 8px; }
        
        /* === 🔍 搜尋列 === */
        .search-container { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        input[type="text"] { width: 100%; max-width: 500px; padding: 14px 20px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 30px; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        button { padding: 14px 30px; font-size: 16px; background: #3b82f6; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }

        .loading, .error, .warning { background: white; padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .loading { color: #3b82f6; }
        .error { color: #ef4444; }
        .warning { color: #d97706; }

        /* === ⭐️ 絕對鎖死雙欄排版 ⭐️ === */
        #result-wrapper { display: flex; flex-direction: row; gap: 30px; align-items: flex-start; margin-top: 20px; width: 100%; }
        
        /* 左欄 */
        #wiki-sidebar { flex: 0 0 350px; background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: none; box-sizing: border-box; }
        #wiki-sidebar .infobox, #wiki-sidebar table { width: 100% !important; margin: 0 !important; float: none !important; border-collapse: collapse; font-size: 14px; }
        #wiki-sidebar th { background-color: #f1f5f9; padding: 10px; border-bottom: 2px solid #cbd5e1; font-weight: bold; border-radius: 4px; text-align: center;}
        #wiki-sidebar td { padding: 10px 5px; border-bottom: 1px dashed #e2e8f0; }
        #wiki-sidebar td:first-child { font-weight: bold; width: 30%; }
        #wiki-sidebar ul { list-style: none !important; padding: 0 !important; margin: 0 !important; }
        #wiki-sidebar img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px auto; display: block; }
        
        /* 右欄 */
        #wiki-content { flex: 1 1 0; min-width: 0; background: #ffffff; border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: none; line-height: 1.8; font-size: 16px; overflow-x: auto; box-sizing: border-box; }

        ul.gallery { display: flex; flex-wrap: wrap; gap: 15px; padding: 0; margin: 20px 0; list-style: none; }
        li.gallerybox { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; width: 160px; text-align: center; }
        li.gallerybox img { max-width: 100%; cursor: zoom-in; border-radius: 4px; opacity: 1 !important; }
        table.wikitable { width: 100%; border-collapse: collapse; margin: 20px 0; }
        table.wikitable th, table.wikitable td { border: 1px solid #cbd5e1; padding: 10px; }
        table.wikitable th { background: #f1f5f9; }
        img { max-width: 100%; cursor: zoom-in; opacity: 1 !important; }
        .thumbinner { border: 1px solid #e2e8f0; padding: 10px; background: #f8fafc; float: right; margin: 0 0 20px 20px; text-align: center; border-radius: 8px; }
        
        .navbox, .mw-editsection, .noprint, .toc, .pi-header { display: none !important; }
        a { color: #3b82f6; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* 燈箱 */
        #lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; }
        #lightbox img { max-width: 90%; max-height: 85vh; border-radius: 8px; border: 3px solid #fff; }
        #lightbox-close { color: white; margin-top: 20px; padding: 8px 25px; font-size: 16px; background: rgba(255,255,255,0.2); border-radius: 20px; cursor: pointer; }
        #lightbox-close:hover { background: rgba(255,255,255,0.4); }

        @media (max-width: 900px) {
            #result-wrapper { flex-direction: column; }
            #wiki-sidebar { flex: auto; width: 100%; }
        }
    </style>
</head>
<body>

    <h1>🗡️ FF14 灰機 Wiki 現代化查詢 <span class="version-tag">(v5.0 絕對防禦版)</span></h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="請輸入關鍵字（例如：塔塔露...）" value="塔塔露">
        <button id="searchBtn" onclick="startSearch()">搜尋資料</button>
    </div>

    <div id="status-msg"></div>

    <div id="result-wrapper">
        <div id="wiki-sidebar"></div>
        <div id="wiki-content"></div>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="放大圖片">
        <div id="lightbox-close">✖ 點擊關閉</div>
    </div>

    <script src="https://unpkg.com/opencc-js@1.0.5/dist/umd/full.js" onerror="document.getElementById('status-msg').innerHTML='<div class=\'warning\'>⚠️ 繁簡轉換器連線異常，將暫時以簡體字顯示結果。</div>'"></script>

    <script>
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });

        function fetchJsonp(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = url + '&callback=' + callbackName;
                script.onerror = () => reject(new Error('伺服器連線被阻擋或超時'));
                document.body.appendChild(script);
            });
        }

        async function startSearch() {
            const statusMsg = document.getElementById('status-msg');
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;

            statusMsg.innerHTML = `<div class="loading">🚀 正在發動超越之力，準備連接以太之光...</div>`;
            document.getElementById('wiki-sidebar').style.display = 'none';
            document.getElementById('wiki-content').style.display = 'none';

            try {
                let s2tConverter = (text) => text;
                let t2sConverter = (text) => text;

                if (typeof OpenCC !== 'undefined') {
                    s2tConverter = OpenCC.Converter({ from: 'cn', to: 'tw' });
                    t2sConverter = OpenCC.Converter({ from: 'tw', to: 'cn' });
                }

                await fetchWikiData(keyword, s2tConverter, t2sConverter, statusMsg);

            } catch (err) {
                statusMsg.innerHTML = `<div class="error">系統發生嚴重錯誤：${err.message}</div>`;
            }
        }

        async function fetchWikiData(keyword, s2tConverter, t2sConverter, statusMsg) {
            const searchKeyword = t2sConverter(keyword);
            statusMsg.innerHTML = `<div class="loading">🔨 資料取得成功，正在進行排版重構...</div>`;

            const baseUrl = "https://ff14.huijiwiki.com/api.php";
            const params = new URLSearchParams({
                action: "parse",
                format: "json",
                page: searchKeyword,
                redirects: "1",
                prop: "text"
            });

            const data = await fetchJsonp(`${baseUrl}?${params.toString()}`);

            if (data.error) {
                statusMsg.innerHTML = `<div class="error">找不到關於「${keyword}」的資訊。Wiki 上可能沒有這個條目。</div>`;
                return;
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(data.parse.text['*'], 'text/html');

            // 圖片修復
            doc.querySelectorAll('img').forEach(img => {
                let realSrc = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('src');
                if (realSrc) {
                    realSrc = realSrc.trim();
                    if (realSrc.startsWith('//')) realSrc = 'https:' + realSrc;
                    else if (realSrc.startsWith('/')) realSrc = 'https://ff14.huijiwiki.com' + realSrc;
                    else if (realSrc.startsWith('http://')) realSrc = realSrc.replace('http://', 'https://');
                    img.setAttribute('src', realSrc);
                }
                img.removeAttribute('data-src'); 
                img.removeAttribute('srcset');
                img.classList.remove('lazyload');
            });

            doc.querySelectorAll('a').forEach(a => {
                if (a.querySelector('img')) { a.outerHTML = a.innerHTML; } 
                else {
                    let href = a.getAttribute('href');
                    if (href && href.startsWith('/')) a.setAttribute('href', 'https://ff14.huijiwiki.com' + href);
                    a.setAttribute('target', '_blank');
                }
            });

            // 真空吸塵器：精準刪除多餘按鈕與真正的空殼
            doc.querySelectorAll('ul.nav, ul.nav-tabs, .tabbernav, .huiji-tabs-nav').forEach(el => el.remove());
            doc.querySelectorAll('li').forEach(li => {
                let cleanText = li.textContent.replace(/[\s\xA0\u200B]/g, ''); 
                if (cleanText === '' && !li.querySelector('img')) {
                    li.remove();
                }
            });

            // 強制展開
            doc.querySelectorAll('.tab-pane, .tabbertab, .huiji-tab-content').forEach(pane => {
                pane.style.display = 'block';
                pane.style.visibility = 'visible';
                pane.style.height = 'auto';
                pane.style.opacity = '1';
                pane.style.marginTop = '20px';
                pane.style.borderTop = '2px dashed #e2e8f0';
                pane.style.paddingTop = '15px';
            });

            // 翻譯
            function translateTextNodes(node) {
                if (node.nodeType === 3) node.nodeValue = s2tConverter(node.nodeValue);
                else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                    node.childNodes.forEach(child => translateTextNodes(child));
                }
            }
            const rootNode = doc.querySelector('.mw-parser-output') || doc.body;
            translateTextNodes(rootNode);

            // 雙欄解體
            statusMsg.innerHTML = ''; 
            const sidebarDiv = document.getElementById('wiki-sidebar');
            const contentDiv = document.getElementById('wiki-content');
            sidebarDiv.innerHTML = ''; contentDiv.innerHTML = '';

            const infoboxes = rootNode.querySelectorAll('.infobox, .portable-infobox, table[class*="infobox"]');
            if (infoboxes.length > 0) {
                infoboxes.forEach(box => sidebarDiv.appendChild(box));
                sidebarDiv.style.display = 'block';
            } else {
                sidebarDiv.style.display = 'none'; 
            }

            contentDiv.appendChild(rootNode);
            contentDiv.style.display = 'block';
        }

        // 燈箱控制
        document.body.addEventListener('click', function(e) {
            if (e.target.tagName === 'IMG' && e.target.id !== 'lightbox-img') {
                e.preventDefault(); e.stopPropagation();
                
                const thumbSrc = e.target.src; 
                let hdSrc = thumbSrc;          
                if (hdSrc.includes('/thumb/')) {
                    hdSrc = hdSrc.replace('/thumb/', '/');
                    hdSrc = hdSrc.substring(0, hdSrc.lastIndexOf('/'));
                }
                
                const lightboxImg = document.getElementById('lightbox-img');
                lightboxImg.onerror = function() { this.onerror = null; this.src = thumbSrc; };
                lightboxImg.src = hdSrc;
                document.getElementById('lightbox').style.display = 'flex';
            }
        });

        document.getElementById('lightbox').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('lightbox-img').src = ''; 
        });
    </script>

</body>
</html>
