<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>FF14 角色專屬資訊卡</title>
    <style>
        /* === 🌐 基礎設定 === */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; color: #1e293b; max-width: 1200px; margin: 30px auto; padding: 20px; }
        h1 { text-align: center; color: #0f172a; margin-bottom: 20px; font-weight: 900; letter-spacing: 1px; }
        .version-tag { font-size: 14px; color: #047857; font-weight: bold; vertical-align: middle; background: #a7f3d0; padding: 4px 10px; border-radius: 8px; border: 1px solid #34d399; }
        
        /* === 🔍 搜尋列 === */
        .find-panel { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        #findInput { width: 100%; max-width: 500px; padding: 14px 20px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 30px; outline: none; transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        #findInput:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
        #findBtn { padding: 14px 30px; font-size: 16px; background: linear-gradient(135deg, #4f46e5, #3730a3); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(79,70,229,0.3); }
        #findBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(79,70,229,0.4); }

        /* 系統訊息區 */
        .loading, .error, .warning { background: white; padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .loading { color: #4f46e5; border-left: 5px solid #4f46e5; }
        .error { color: #ef4444; border-left: 5px solid #ef4444; }

        /* =========================================
           ⭐️ 完美對應「附圖三」的單一卡片架構 ⭐️
           ========================================= */
        #main-card {
            display: none;
            background: #ffffff;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
            margin-bottom: 40px;
        }

        .card-main-title { font-size: 26px; font-weight: 900; color: #0f172a; margin-top: 0; margin-bottom: 25px; padding-bottom: 12px; border-bottom: 3px solid #4f46e5; display: inline-block; }
        .card-top-flex { display: flex; flex-direction: row; gap: 35px; margin-bottom: 40px; }
        
        /* 左側：照片 + 按鈕 */
        .card-left { flex: 0 0 350px; display: flex; flex-direction: column; gap: 15px; }
        #dash-img-container { width: 100%; height: 450px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #dash-main-img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; transition: opacity 0.3s ease; }
        #dash-img-controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .img-btn { background: #ffffff; color: #475569; border: 1px solid #cbd5e1; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .img-btn:hover { background: #e2e8f0; }
        .img-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; box-shadow: 0 4px 6px rgba(79,70,229,0.2); }

        /* 右側：資料區 */
        .card-right { flex: 1; display: flex; flex-direction: column; gap: 0; overflow-y: auto; max-height: 550px; padding-right: 15px; }
        .card-right::-webkit-scrollbar { width: 6px; }
        .card-right::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .dash-group-title { font-size: 17px; font-weight: 900; color: #ffffff; margin: 15px 0 5px 0; background: #4f46e5; padding: 8px 15px; border-radius: 6px; letter-spacing: 1px; }
        .dash-row { display: flex; align-items: flex-start; padding: 12px 0; border-bottom: 1px dashed #e2e8f0; font-size: 15px; line-height: 1.6; }
        .dash-row:last-child { border-bottom: none; }
        .dash-lbl { flex: 0 0 130px; font-weight: 800; color: #64748b; padding-top: 2px; }
        .dash-val { flex: 1; color: #1e293b; }
        .dash-val a { color: #3b82f6; text-decoration: none; font-weight: bold; }
        .dash-val a:hover { text-decoration: underline; }

        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .dash-pill { background: #e0e7ff; color: #3730a3; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; display: inline-block; border: 1px solid #c7d2fe; }

        /* 下半部：詳細資料 */
        .card-bottom-section { border-top: 2px dashed #cbd5e1; padding-top: 30px; line-height: 1.8; font-size: 16px; color: #334155; }
        .bottom-title { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 20px; display: inline-block; border-left: 5px solid #4f46e5; padding-left: 10px; }
        
        #wiki-content table.wikitable { width: 100%; border-collapse: collapse; margin: 20px 0; box-shadow: 0 0 0 1px #d1d5db; border-radius: 8px; overflow: hidden; }
        #wiki-content table.wikitable th, #wiki-content table.wikitable td { border: 1px solid #d1d5db; padding: 12px; }
        #wiki-content table.wikitable th { background: #f8fafc; color: #0f172a; }
        #wiki-content img { max-width: 100%; height: auto; border-radius: 8px; cursor: zoom-in; margin: 10px 0; }
        
        .navbox, .mw-editsection, .noprint, .toc, .pi-header { display: none !important; }
        .read-more { display: block; margin-top: 40px; text-align: center; font-size: 16px; font-weight: bold; padding: 15px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 12px; color: #475569; transition: 0.2s; text-decoration: none; }
        .read-more:hover { background: #e2e8f0; color: #0f172a; }

        /* 燈箱 */
        #lightbox { display: none; position: fixed; z-index: 999999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(5px); }
        #lightbox img { max-width: 90%; max-height: 85vh; border-radius: 8px; border: 3px solid #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.8); object-fit: contain; }
        #lightbox-close { color: white; margin-top: 25px; padding: 10px 30px; font-size: 16px; background: rgba(255,255,255,0.2); border-radius: 30px; cursor: pointer; font-weight: bold; border: 1px solid rgba(255,255,255,0.4); transition: 0.2s; }
        #lightbox-close:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }

        @media (max-width: 900px) { .card-top-flex { flex-direction: column; } .card-left { flex: auto; width: 100%; } }
    </style>
</head>
<body>

    <h1>🗡️ FF14 角色資訊面板 <span class="version-tag">(v13333 破除幻象版)</span></h1>
    
    <div class="find-panel">
        <input type="text" id="findInput" placeholder="請輸入關鍵字（例如：塔塔露...）" value="塔塔露">
        <button id="findBtn">搜尋角色</button>
    </div>

    <div id="status-msg"></div>

    <div id="main-card">
        <div class="card-main-title">人物詳細資料</div>
        <div class="card-top-flex">
            <div class="card-left">
                <div id="dash-img-container">
                    <img id="dash-main-img" src="" alt="角色圖片">
                </div>
                <div id="dash-img-controls"></div>
            </div>
            <div class="card-right" id="dash-right"></div>
        </div>

        <div class="card-bottom-section">
            <div class="bottom-title">生平經歷與詳細介紹</div>
            <div id="wiki-content"></div>
        </div>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="放大圖片">
        <div id="lightbox-close">✖ 點擊關閉</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('findBtn');
            const input = document.getElementById('findInput');
            const statusMsg = document.getElementById('status-msg');
            const mainCard = document.getElementById('main-card');
            let characterImages = [];

            btn.addEventListener('click', triggerSearch);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerSearch(); });

            function triggerSearch() {
                try {
                    const keyword = input.value.trim();
                    if (!keyword) return;
                    
                    mainCard.style.display = 'none';
                    executeDashboardBuild(keyword);
                } catch (err) {
                    statusMsg.innerHTML = `<div class="error">💥 啟動失敗：${err.message}</div>`;
                }
            }

            function fetchJsonp(url, timeout = 8000) {
                return new Promise((resolve, reject) => {
                    const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                    let script = document.createElement('script');
                    
                    const timer = setTimeout(() => {
                        cleanup();
                        reject(new Error('JSONP Timeout'));
                    }, timeout);

                    function cleanup() {
                        if (script.parentNode) document.body.removeChild(script);
                        delete window[callbackName];
                        clearTimeout(timer);
                    }

                    window[callbackName] = function(data) {
                        cleanup();
                        resolve(data);
                    };

                    script.src = url + '&callback=' + callbackName;
                    script.onerror = () => { cleanup(); reject(new Error('JSONP Error')); };
                    document.body.appendChild(script);
                });
            }

            // ⭐️ 核心防護魔法：不再被假錯誤騙了 ⭐️
            async function superFetch(searchKeyword, statusMsg) {
                const targetUrl = `https://ff14.huijiwiki.com/api.php?action=parse&format=json&page=${encodeURIComponent(searchKeyword)}&redirects=1&prop=text`;
                
                // 嚴格檢驗：只要不是「真正成功的資料」或「確定無此頁面」，一律當成是被防火牆擋下！
                const isValid = (data) => {
                    if (data && data.parse) return true;
                    // missingtitle 才是真正的找不到頁面，其餘的 badorigin 等通通是防火牆的幻象
                    if (data && data.error && data.error.code === 'missingtitle') return true;
                    return false;
                };

                statusMsg.innerHTML = `<div class="loading">🚀 啟動通道 1 (原生腳本直連)...</div>`;
                try {
                    let data = await fetchJsonp(targetUrl);
                    if (isValid(data)) return data;
                } catch(e) {}

                statusMsg.innerHTML = `<div class="loading">🚀 通道 1 受阻，切換通道 2 (AllOrigins 代理)...</div>`;
                try {
                    let res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`);
                    let data = await res.json();
                    if (isValid(data)) return data;
                } catch(e) {}

                statusMsg.innerHTML = `<div class="loading">🚀 通道 2 受阻，切換通道 3 (CorsProxy 代理)...</div>`;
                try {
                    let res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                    let data = await res.json();
                    if (isValid(data)) return data;
                } catch(e) {}

                statusMsg.innerHTML = `<div class="loading">🚀 切換最後通道 (跨域強登)...</div>`;
                try {
                    let res = await fetch(targetUrl + '&origin=*');
                    let data = await res.json();
                    if (isValid(data)) return data;
                } catch(e) {}

                throw new Error("所有連線通道皆被防火牆無情攔截，請稍後再試。");
            }

            async function executeDashboardBuild(keyword) {
                try {
                    let s2tConverter = (text) => text;
                    let t2sConverter = (text) => text;

                    if (window.OpenCC && typeof window.OpenCC.Converter === 'function') {
                        s2tConverter = window.OpenCC.Converter({ from: 'cn', to: 'tw' });
                        t2sConverter = window.OpenCC.Converter({ from: 'tw', to: 'cn' });
                    }

                    const searchKeyword = t2sConverter(keyword);

                    // 執行具備防騙機制的多重連線
                    let data = await superFetch(searchKeyword, statusMsg);

                    // 只有真的回傳 missingtitle，才會顯示這行
                    if (data.error) {
                        statusMsg.innerHTML = `<div class="error">找不到關於「${keyword}」的資訊。</div>`;
                        return;
                    }

                    statusMsg.innerHTML = `<div class="loading">🔨 突破成功！正在組裝完美面板...</div>`;
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(data.parse.text['*'], 'text/html');

                    // 物理超渡超連結
                    doc.querySelectorAll('a').forEach(a => {
                        const img = a.querySelector('img');
                        if (img) {
                            a.parentNode.insertBefore(img, a); 
                            a.remove(); 
                        } else {
                            let href = a.getAttribute('href');
                            if (href && href.startsWith('/')) a.setAttribute('href', 'https://ff14.huijiwiki.com' + href);
                            a.setAttribute('target', '_blank');
                        }
                    });

                    doc.querySelectorAll('.mw-editsection, .noprint, style, script').forEach(e => e.remove());

                    const infobox = doc.querySelector('.infobox, .portable-infobox, table[class*="infobox"]');
                    
                    if (infobox) {
                        // 1. 抽取照片與按鈕
                        characterImages = [];
                        const addedUrls = new Set(); 

                        infobox.querySelectorAll('img').forEach(img => {
                            let src = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('src');
                            if (!src || src.includes('16px') || src.includes('20px')) return; 

                            if (src.startsWith('//')) src = 'https:' + src;
                            else if (src.startsWith('/')) src = 'https://ff14.huijiwiki.com' + src;
                            if (src.includes('/thumb/')) {
                                src = src.replace('/thumb/', '/');
                                src = src.substring(0, src.lastIndexOf('/'));
                            }

                            if(addedUrls.has(src)) return;
                            addedUrls.add(src);

                            let label = "外觀預覽";
                            let tabPane = img.closest('.tab-pane, .tabbertab, .pi-image-collection-tab-content');
                            if (tabPane) {
                                label = tabPane.getAttribute('title') || tabPane.getAttribute('data-title') || label;
                                let ref = tabPane.getAttribute('data-ref');
                                if (ref) {
                                    let navLi = infobox.querySelector(`.pi-image-collection-tabs li[data-ref="${ref}"]`);
                                    if (navLi) label = navLi.textContent.trim();
                                }
                            } else if (img.getAttribute('alt') && img.getAttribute('alt').length < 15) {
                                label = img.getAttribute('alt');
                            }
                            characterImages.push({ url: src, label: label });
                        });

                        if (characterImages.length === 0) characterImages.push({ url: 'https://via.placeholder.com/350x450?text=無圖片', label: '預設' });

                        // 2. 逐列排版魔法
                        let rightPanelHtml = '';
                        const mainTabs = infobox.querySelectorAll('.huiji-tab-content > .tab-pane, .pi-theme-default > .tabber > .tabbertab');

                        function extractRows(container) {
                            let html = '';
                            if (container.querySelector('.pi-data')) {
                                container.querySelectorAll('.pi-header, .pi-data').forEach(node => {
                                    if (node.classList.contains('pi-header')) {
                                        html += `<div class="dash-group-title">${node.innerHTML}</div>`;
                                    } else if (node.classList.contains('pi-data')) {
                                        let lbl = node.querySelector('.pi-data-label');
                                        let val = node.querySelector('.pi-data-value');
                                        if (lbl && val) html += `<div class="dash-row"><div class="dash-lbl">${lbl.innerHTML}</div><div class="dash-val">${val.innerHTML}</div></div>`;
                                        else if (val) html += `<div class="dash-row"><div class="dash-val">${val.innerHTML}</div></div>`;
                                    }
                                });
                                return html;
                            }

                            const rows = container.querySelectorAll('tr');
                            if (rows.length > 0) {
                                rows.forEach(tr => {
                                    let th = tr.querySelector('th');
                                    let td = tr.querySelector('td');
                                    if (th && td) html += `<div class="dash-row"><div class="dash-lbl">${th.innerHTML}</div><div class="dash-val">${td.innerHTML}</div></div>`;
                                    else if (th && !td) html += `<div class="dash-group-title">${th.innerHTML}</div>`;
                                });
                            }

                            const lists = container.querySelectorAll('li');
                            let hasListPills = false;
                            let pillHtml = '<div class="pill-container">';
                            
                            lists.forEach(li => {
                                let rawText = li.textContent.replace(/[\s\xA0\u200B]/g, '');
                                if (rawText === '' && !li.querySelector('img')) return; 

                                if (li.innerHTML.includes('：')) {
                                    let parts = li.innerHTML.split('：');
                                    let lbl = parts.shift();
                                    let val = parts.join('：');
                                    html += `<div class="dash-row"><div class="dash-lbl">${lbl}</div><div class="dash-val">${val}</div></div>`;
                                } else if (li.innerHTML.includes(':') && !li.innerHTML.includes('http')) {
                                    let parts = li.innerHTML.split(':');
                                    let lbl = parts.shift();
                                    let val = parts.join(':');
                                    html += `<div class="dash-row"><div class="dash-lbl">${lbl}</div><div class="dash-val">${val}</div></div>`;
                                } else {
                                    hasListPills = true;
                                    pillHtml += `<span class="dash-pill">${li.innerHTML}</span>`;
                                }
                            });
                            pillHtml += '</div>';
                            if (hasListPills) html += pillHtml;

                            return html;
                        }

                        if (mainTabs.length > 0) {
                            mainTabs.forEach(tab => {
                                let tabTitle = tab.getAttribute('title') || tab.getAttribute('data-title') || '資料';
                                rightPanelHtml += `<div class="dash-group-title" style="background:#1e293b; color:white;">📌 ${tabTitle}</div>`;
                                rightPanelHtml += extractRows(tab);
                            });
                        } else {
                            rightPanelHtml += extractRows(infobox);
                        }

                        document.getElementById('dash-right').innerHTML = s2tConverter(rightPanelHtml) || '<div class="dash-row">無詳細資料</div>';
                        
                        const controlsContainer = document.getElementById('dash-img-controls');
                        controlsContainer.innerHTML = '';
                        characterImages.forEach((imgObj, index) => {
                            let btn = document.createElement('button');
                            btn.className = `img-btn ${index === 0 ? 'active' : ''}`;
                            btn.innerText = s2tConverter(imgObj.label);
                            btn.onclick = () => changeDashboardImage(index, btn);
                            controlsContainer.appendChild(btn);
                        });

                        changeDashboardImage(0, controlsContainer.firstChild);
                        infobox.remove(); 
                    }

                    // 3. 處理下方文章
                    doc.querySelectorAll('ul[class*="nav"], div[class*="nav"], .tabbernav').forEach(el => el.remove());
                    doc.querySelectorAll('.tab-pane, .tabbertab').forEach(el => {
                        el.style.display = 'block'; el.style.opacity = '1'; el.style.visibility = 'visible'; el.style.height = 'auto';
                    });
                    
                    doc.querySelectorAll('img').forEach(img => {
                        let src = img.getAttribute('data-src') || img.getAttribute('src');
                        if (src) {
                            if (src.startsWith('//')) src = 'https:' + src;
                            else if (src.startsWith('/')) src = 'https://ff14.huijiwiki.com' + src;
                            img.setAttribute('src', src);
                        }
                        img.removeAttribute('data-src'); img.removeAttribute('srcset'); img.classList.remove('lazyload');
                        img.style.cursor = 'zoom-in';
                    });

                    function translateTextNodes(node) {
                        if (node.nodeType === 3) node.nodeValue = s2tConverter(node.nodeValue);
                        else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                            node.childNodes.forEach(child => translateTextNodes(child));
                        }
                    }
                    const rootNode = doc.querySelector('.mw-parser-output') || doc.body;
                    translateTextNodes(rootNode);

                    document.getElementById('status-msg').innerHTML = '';
                    
                    const wikiUrl = `https://ff14.huijiwiki.com/wiki/${encodeURIComponent(data.parse.title)}`;
                    const readMoreBtn = `<a href="${wikiUrl}" target="_blank" class="read-more">🔗 前往原站閱讀完整條目</a>`;
                    
                    document.getElementById('wiki-content').innerHTML = rootNode.innerHTML + readMoreBtn;
                    
                    // 顯示終極面板！
                    mainCard.style.display = 'block';

                } catch (error) {
                    document.getElementById('status-msg').innerHTML = `<div class="error">發生錯誤：${error.message}</div>`;
                }
            }

            window.changeDashboardImage = function(index, btnElement) {
                const imgEl = document.getElementById('dash-main-img');
                const targetUrl = characterImages[index].url;
                
                imgEl.style.opacity = '0';
                setTimeout(() => {
                    imgEl.src = targetUrl;
                    imgEl.onerror = () => { imgEl.src = 'https://via.placeholder.com/350x450?text=無高畫質圖片'; };
                    imgEl.onload = () => { imgEl.style.opacity = '1'; };
                }, 150);

                if(btnElement) {
                    document.querySelectorAll('.img-btn').forEach(b => b.classList.remove('active'));
                    btnElement.classList.add('active');
                }
            };

            // 全局燈箱
            document.addEventListener('click', function(e) {
                if (e.target.tagName === 'IMG' && e.target.id !== 'lightbox-img') {
                    e.preventDefault(); 
                    e.stopPropagation();
                    
                    let src = e.target.src;
                    if (!src || src.includes('placeholder')) return;

                    if (src.includes('/thumb/')) {
                        src = src.replace('/thumb/', '/');
                        src = src.substring(0, src.lastIndexOf('/'));
                    }
                    
                    const lightboxImg = document.getElementById('lightbox-img');
                    lightboxImg.onerror = function() { this.onerror = null; this.src = e.target.src; };
                    lightboxImg.src = src;
                    document.getElementById('lightbox').style.display = 'flex';
                }
            }, true); 

            document.getElementById('lightbox').addEventListener('click', function() {
                this.style.display = 'none';
            });
        });
    </script>
</body>
</html>
