<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 灰機 Wiki 快速查詢</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; max-width: 1100px; margin: 50px auto; padding: 20px; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #45a049; }
        #result { background-color: white; padding: 30px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 100px; line-height: 1.6; overflow: hidden; font-size: 15px; }
        .loading { color: #8a2be2; font-style: italic; font-weight: bold; }
        .error { color: #d32f2f; font-weight: bold; }
        
        /* === Wiki 專屬 CSS 修復 === */
        /* 1. 右側角色資訊框 (Infobox) */
        .infobox { float: right; width: 320px; background: #f9f9f9; border: 1px solid #aaa; padding: 10px; margin: 0 0 15px 20px; clear: right; font-size: 13px; }
        .infobox th { background-color: #e0e0e0; text-align: center; padding: 5px; }
        .infobox td { padding: 5px; border-bottom: 1px solid #eee; }
        /* 2. 一般表格 (Wikitable) */
        table.wikitable { border-collapse: collapse; width: 100%; margin: 15px 0; }
        table.wikitable th, table.wikitable td { border: 1px solid #a2a9b1; padding: 8px; }
        table.wikitable th { background-color: #eaecf0; text-align: center; }
        /* 3. 圖片與浮動元素修復 */
        img { max-width: 100%; height: auto; border: none; }
        .thumb { float: right; margin: 10px; border: 1px solid #ccc; padding: 5px; background: #fff; text-align: center; }
        .thumbcaption { font-size: 12px; color: #666; margin-top: 5px; text-align: left; }
        .mw-parser-output::after { content: ""; display: table; clear: both; } /* 清除浮動 */
        /* 4. 隱藏不必要的 Wiki 導航與編輯按鈕 */
        .navbox, .mw-editsection, .noprint, .toc { display: none !important; }
        ul { padding-left: 20px; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .read-more { display: block; margin-top: 30px; text-align: center; font-size: 16px; font-weight: bold; padding: 10px; background: #eef; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>🗡️ FF14 灰機 Wiki 快速查詢</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="請輸入關鍵字（例如：塔塔露、拂曉血盟...）" value="塔塔露">
        <button id="searchBtn">搜尋</button>
    </div>

    <div id="result">在這裡顯示查詢結果...</div>

    <script>
        window.onload = function() {
            try {
                const s2tConverter = OpenCC.Converter({ from: 'cn', to: 'tw' }); 
                const t2sConverter = OpenCC.Converter({ from: 'tw', to: 'cn' }); 

                document.getElementById('searchBtn').addEventListener('click', () => {
                    const keyword = document.getElementById('searchInput').value.trim();
                    if (keyword) fetchWikiData(keyword, s2tConverter, t2sConverter);
                });

                document.getElementById('searchInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') document.getElementById('searchBtn').click();
                });
            } catch (error) {
                document.getElementById('result').innerHTML = `<span class="error">OpenCC 載入失敗。</span>`;
            }
        };

        function fetchJsonp(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = url + '&callback=' + callbackName;
                script.onerror = () => reject(new Error('連線被阻擋'));
                document.body.appendChild(script);
            });
        }

        async function fetchWikiData(keyword, s2tConverter, t2sConverter) {
            const resultDiv = document.getElementById('result');
            const searchKeyword = t2sConverter(keyword);
            
            resultDiv.innerHTML = `<span class="loading">正在搬運並修復 Wiki 網頁資料...</span>`;

            const baseUrl = "https://ff14.huijiwiki.com/api.php";
            const params = new URLSearchParams({
                action: "parse",
                format: "json",
                page: searchKeyword,
                redirects: "1",
                prop: "text"
            });

            try {
                const data = await fetchJsonp(`${baseUrl}?${params.toString()}`);

                if (data.error) {
                    resultDiv.innerHTML = `<span class="error">找不到關於「${keyword}」的資訊。</span>`;
                    return;
                }

                // 取得原始 HTML 字串
                const htmlContent = data.parse.text['*'];

                // 建立一個虛擬的網頁環境 (DOM) 來進行精準修復
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');

                // 🔧 核心修復 1：處理圖片 Lazy Load 與相對路徑
                doc.querySelectorAll('img').forEach(img => {
                    // 抓出真正的圖片網址 (可能藏在 data-src 或 data-lazy-src 裡)
                    let realSrc = img.getAttribute('data-src') || img.getAttribute('data-lazy-src') || img.getAttribute('src');
                    if (realSrc) {
                        if (realSrc.startsWith('//')) {
                            img.src = 'https:' + realSrc; // 補全 // 開頭的網址
                        } else if (realSrc.startsWith('/')) {
                            img.src = 'https://ff14.huijiwiki.com' + realSrc; // 補全 / 開頭的網址
                        } else {
                            img.src = realSrc;
                        }
                    }
                    // 移除多餘的延遲加載屬性，強迫瀏覽器立刻載入圖片
                    img.removeAttribute('data-src');
                    img.removeAttribute('srcset');
                });

                // 🔧 核心修復 2：修復超連結
                doc.querySelectorAll('a').forEach(a => {
                    let href = a.getAttribute('href');
                    if (href) {
                        if (href.startsWith('/')) {
                            a.href = 'https://ff14.huijiwiki.com' + href;
                        }
                    }
                    a.target = '_blank'; // 讓所有連結都在新分頁開啟
                });

                // 提取修復後的 HTML (只取有用的主內容區塊 mw-parser-output)
                const rootNode = doc.querySelector('.mw-parser-output');
                let cleanHtml = rootNode ? rootNode.innerHTML : doc.body.innerHTML;

                // 進行簡轉繁
                const traditionalHtml = s2tConverter(cleanHtml);
                
                const pageTitle = data.parse.title; 
                const wikiUrl = `https://ff14.huijiwiki.com/wiki/${encodeURIComponent(pageTitle)}`;
                const readMoreBtn = `<a href="${wikiUrl}" target="_blank" class="read-more">🔗 前往灰機 Wiki 閱讀原始條目</a>`;

                // 顯示結果
                resultDiv.innerHTML = traditionalHtml + readMoreBtn;

            } catch (error) {
                console.error("抓取失敗:", error);
                resultDiv.innerHTML = `<span class="error">資料搬運失敗：${error.message}</span>`;
            }
        }
    </script>

</body>
</html>
