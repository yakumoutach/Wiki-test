<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>FF14 角色專屬資訊卡 - 藍圖版</title>
    <style>
        /* === 🌐 基礎設定 === */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #f1f5f9; color: #1e293b; max-width: 1100px; margin: 30px auto; padding: 20px; }
        h1 { text-align: center; color: #0f172a; margin-bottom: 25px; font-weight: 900; }
        
        /* === 🔍 搜尋列 === */
        .search-container { display: flex; gap: 10px; margin-bottom: 40px; justify-content: center; }
        #findInput { width: 100%; max-width: 450px; padding: 12px 20px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 10px; outline: none; }
        #findBtn { padding: 12px 30px; background: #4f46e5; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #findBtn:hover { background: #4338ca; }

        .sys-msg { background: #fff; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 20px; border: 1px solid #e2e8f0; }

        /* =========================================
           ⭐️ 依照架構圖重新排列的藍圖容器 ⭐️
           ========================================= */
        #blueprint-container {
            display: none; 
            background: #ffffff;
            border: 2px solid #0f172a;
            padding: 30px;
            position: relative;
            box-shadow: 10px 10px 0px #cbd5e1;
        }

        /* 總標題：人物詳細資料 */
        .main-title {
            position: absolute;
            top: -18px;
            left: 20px;
            background: #f1f5f9;
            padding: 0 15px;
            font-size: 22px;
            font-weight: 900;
            color: #0f172a;
            border: 2px solid #0f172a;
        }

        /* 上半部左右布局 */
        .bp-main-content {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
        }

        /* 左側：照片與版本 */
        .bp-left-layout {
            flex: 0 0 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 人物照片框 */
        .bp-box {
            border: 2px solid #0f172a;
            position: relative;
            padding: 20px;
            background: #fff;
        }
        .bp-box-label {
            position: absolute;
            top: -12px;
            left: 12px;
            background: white;
            padding: 0 8px;
            font-size: 14px;
            font-weight: bold;
            color: #475569;
        }

        #photo-box { height: 480px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #photo-box img { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.3s; cursor: zoom-in; }

        /* 版本按鈕區 */
        #version-box { min-height: 80px; }
        .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
        .bp-btn { background: #f8fafc; border: 1px solid #0f172a; padding: 6px 12px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .bp-btn:hover { background: #e2e8f0; }
        .bp-btn.active { background: #0f172a; color: white; }

        /* 右側：信息呈現 */
        .bp-right-layout {
            flex: 1;
            border: 2px solid #0f172a;
            position: relative;
            padding: 25px;
            max-height: 604px;
            overflow-y: auto;
        }

        /* 信息欄位樣式 */
        .info-group { background: #0f172a; color: white; padding: 5px 12px; font-weight: bold; margin-top: 15px; margin-bottom: 10px; }
        .info-group:first-child { margin-top: 0; }
        .info-row { display: flex; border-bottom: 1px solid #e2e8f0; padding: 8px 0; font-size: 15px; }
        .info-lbl { flex: 0 0 110px; font-weight: 900; color: #64748b; }
        .info-val { flex: 1; color: #1e293b; line-height: 1.5; }
        .pill { display: inline-block; background: #f1f5f9; border: 1px solid #cbd5e1; padding: 2px 10px; border-radius: 4px; font-size: 12px; margin: 2px; }

        /* 下半部：簡介資料排版 */
        .bp-bottom-layout {
            border: 2px solid #0f172a;
            position: relative;
            padding: 25px;
            line-height: 1.8;
        }
        #wiki-content table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        #wiki-content th, #wiki-content td { border: 1px solid #cbd5e1; padding: 8px; text-align: left; }
        #wiki-content th { background: #f8fafc; }
        .read-more { display: block; text-align: center; margin-top: 20px; padding: 15px; border: 2px dashed #cbd5e1; text-decoration: none; color: #4f46e5; font-weight: bold; }

        /* 燈箱 */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 90%; border: 4px solid white; }

        @media (max-width: 900px) {
            .bp-main-content { flex-direction: column; }
            .bp-left-layout { flex: auto; width: 100%; }
        }
    </style>
</head>
<body>

    <h1>🗡️ FF14 角色情報中心</h1>
    
    <div class="search-container">
        <input type="text" id="findInput" placeholder="輸入角色名稱 (例如: 雅·修特拉)" value="雅·修特拉">
        <button id="findBtn">讀取檔案</button>
    </div>

    <div id="status-msg"></div>

    <!-- 依照架構圖設計的容器 -->
    <div id="blueprint-container">
        <div class="main-title">人物詳細資料</div>

        <div class="bp-main-content">
            <!-- 左側列 -->
            <div class="bp-left-layout">
                <div class="bp-box" id="photo-box">
                    <div class="bp-box-label">人物照片</div>
                    <img id="main-img" src="" alt="等待載入">
                </div>
                
                <div class="bp-box" id="version-box">
                    <div class="bp-box-label">對應人物版本 (附圖描述)</div>
                    <div id="img-controls" class="btn-grid"></div>
                </div>
            </div>

            <!-- 右側列 -->
            <div class="bp-right-layout" id="info-panel">
                <div class="bp-box-label">角色信息, 相關信息 逐列呈現出來</div>
                <div id="info-content"></div>
            </div>
        </div>

        <!-- 底部區塊 -->
        <div class="bp-bottom-layout">
            <div class="bp-box-label">簡介以後的資料排版</div>
            <div id="wiki-content"></div>
        </div>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" src="">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('findBtn');
            const input = document.getElementById('findInput');
            const statusMsg = document.getElementById('status-msg');
            const bpContainer = document.getElementById('blueprint-container');
            let characterImages = [];

            // 初始搜尋
            if(input.value) triggerSearch();

            btn.addEventListener('click', triggerSearch);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerSearch(); });

            function triggerSearch() {
                const keyword = input.value.trim();
                if (!keyword) return;
                statusMsg.innerHTML = `<div class="sys-msg">📡 正在從灰機 Wiki 讀取角色數據...</div>`;
                bpContainer.style.display = 'none';
                fetchWikiData(keyword);
            }

            async function fetchWikiData(keyword) {
                try {
                    let s2t = (t) => t;
                    let t2s = (t) => t;
                    if (window.OpenCC) {
                        s2t = window.OpenCC.Converter({ from: 'cn', to: 'tw' });
                        t2s = window.OpenCC.Converter({ from: 'tw', to: 'cn' });
                    }

                    const searchKeyword = t2s(keyword);
                    const url = `https://ff14.huijiwiki.com/api.php?action=parse&format=json&page=${encodeURIComponent(searchKeyword)}&redirects=1&prop=text&origin=*`;
                    
                    const res = await fetch(url);
                    const data = await res.json();

                    if (data.error) {
                        statusMsg.innerHTML = `<div class="sys-msg" style="color:red;">❌ 找不到角色「${keyword}」，請確認名稱是否正確。</div>`;
                        return;
                    }

                    const htmlContent = data.parse.text['*'];
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlContent, 'text/html');

                    // 1. 清理不必要的元素
                    doc.querySelectorAll('.mw-editsection, .noprint, style, script, .toc, .navbox').forEach(el => el.remove());

                    // 2. 提取圖片 (收割機邏輯)
                    characterImages = [];
                    let addedUrls = new Set();
                    
                    // 尋找可能的分頁標籤名稱
                    let potentialLabels = [];
                    doc.querySelectorAll('ul li').forEach(li => {
                        let text = li.textContent.trim();
                        if (text.length > 0 && text.length < 10) potentialLabels.push(text);
                    });

                    doc.querySelectorAll('img').forEach(img => {
                        let src = img.getAttribute('src');
                        if (!src || src.includes('icon') || src.includes('Bilibili') || src.length < 10) return;
                        if (src.startsWith('//')) src = 'https:' + src;
                        else if (src.startsWith('/')) src = 'https://ff14.huijiwiki.com' + src;
                        
                        // 轉換為原圖
                        if (src.includes('/thumb/')) {
                            src = src.replace('/thumb/', '/').substring(0, src.replace('/thumb/', '/').lastIndexOf('/'));
                        }

                        if (!addedUrls.has(src)) {
                            addedUrls.add(src);
                            let label = img.getAttribute('alt') || potentialLabels.shift() || "外觀預覽";
                            characterImages.push({ url: src, label: label });
                        }
                        img.remove(); // 從正文中移除，統一放左側
                    });

                    // 3. 解析 Infobox (右側資料)
                    let infoHtml = '';
                    const infobox = doc.querySelector('.infobox, .portable-infobox, .huiji-infobox, table.wikitable');
                    if (infobox) {
                        infobox.querySelectorAll('tr, .pi-item').forEach(row => {
                            let label = row.querySelector('th, .pi-data-label');
                            let value = row.querySelector('td, .pi-data-value');
                            if (label && value) {
                                infoHtml += `<div class="info-row"><div class="info-lbl">${label.innerHTML}</div><div class="info-val">${value.innerHTML}</div></div>`;
                            } else if (row.classList.contains('pi-header') || row.tagName === 'TH') {
                                infoHtml += `<div class="info-group">${row.innerHTML}</div>`;
                            }
                        });
                        infobox.remove();
                    }

                    // 4. 渲染界面
                    statusMsg.innerHTML = '';
                    bpContainer.style.display = 'block';

                    // 右側信息
                    document.getElementById('info-content').innerHTML = s2t(infoHtml || "暫無詳細表格資料");

                    // 左側圖片與按鈕
                    const controls = document.getElementById('img-controls');
                    controls.innerHTML = '';
                    if (characterImages.length === 0) characterImages.push({url: 'https://via.placeholder.com/400x600?text=No+Image', label: '預設'});
                    
                    characterImages.forEach((item, idx) => {
                        const b = document.createElement('button');
                        b.className = 'bp-btn' + (idx === 0 ? ' active' : '');
                        b.innerText = s2t(item.label);
                        b.onclick = () => switchImage(idx, b);
                        controls.appendChild(b);
                    });
                    switchImage(0, controls.firstChild);

                    // 下方正文
                    const wikiOutput = doc.querySelector('.mw-parser-output') || doc.body;
                    
                    // 翻譯正文
                    function walk(node) {
                        if (node.nodeType === 3) node.nodeValue = s2t(node.nodeValue);
                        node.childNodes.forEach(walk);
                    }
                    walk(wikiOutput);

                    const wikiLink = `https://ff14.huijiwiki.com/wiki/${encodeURIComponent(data.parse.title)}`;
                    document.getElementById('wiki-content').innerHTML = wikiOutput.innerHTML + 
                        `<a href="${wikiLink}" target="_blank" class="read-more">🔗 點此前往 Wiki 查閱更多細節</a>`;

                } catch (err) {
                    statusMsg.innerHTML = `<div class="sys-msg" style="color:red;">發生意外錯誤：${err.message}</div>`;
                }
            }

            function switchImage(index, btn) {
                const img = document.getElementById('main-img');
                img.style.opacity = '0';
                setTimeout(() => {
                    img.src = characterImages[index].url;
                    img.onload = () => img.style.opacity = '1';
                }, 200);
                
                document.querySelectorAll('.bp-btn').forEach(b => b.classList.remove('active'));
                if(btn) btn.classList.add('active');
            }

            // 燈箱功能
            document.addEventListener('click', (e) => {
                if (e.target.tagName === 'IMG' && (e.target.id === 'main-img' || e.target.closest('#wiki-content'))) {
                    document.getElementById('lightbox-img').src = e.target.src;
                    document.getElementById('lightbox').style.display = 'flex';
                }
            });
            document.getElementById('lightbox').onclick = function() { this.style.display = 'none'; };
        });
    </script>
</body>
</html>
